name: Build and Commit Release Files

on:
  push:
    paths:
      - 'SourceCode/**'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish for Windows
      run: |
        dotnet publish SourceCode/AppLauncher.csproj -c Release `
          -r win-x64 --self-contained false `
          -o Release

    - name: Commit Release folder
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add Release
        git commit -m "Auto build EXE" || echo "No changes"
        git push
